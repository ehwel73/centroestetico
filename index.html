<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Estético</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <h1>Centro Estético</h1>
        <p>Realza tu belleza con nuestros tratamientos profesionales</p>
    </header>

    <section id="servicios">
        <h2>Servicios y precios</h2>

        <div class="servicio">
            <h3>Manicura Semipermanente</h3>
            <p>25€</p>
        </div>

        <div class="servicio">
            <h3>Extensiones de Pestañas</h3>
            <p>45€</p>
        </div>
    </section>

    <section id="galeria">
        <h2>Nuestros trabajos</h2>

        <div class="galeria-grid">
            <img src="img/trabajo1.jpg" alt="Trabajo 1">
            <img src="img/trabajo2.jpg" alt="Trabajo 2">
        </div>
    </section>

    <section id="equipo">
        <h2>Nuestro equipo</h2>

        <div class="tecnico">
            <h3>María</h3>
            <p>Especialista en uñas</p>

            <a href="https://wa.me/34600111222" target="_blank">
                Reservar cita
            </a>
        </div>
    </section>

    <script src="js/main.js"></script>

</body>
</html>
